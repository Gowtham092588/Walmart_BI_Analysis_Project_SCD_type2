version: 2

models:
    - name: department_raw
      description: "dbt model to create the department raw table"
    - name: stores_raw
      description: "dbt model to create the stores raw table"
      columns:
        - name: store
          description: "The primary key for this table"
          tests:
              - unique
              - not_null
    - name: fact_raw
      description: "dbt model to create the fact raw table"



sources:
  - name: department
    database: WALMARTDB
    schema: DATA
    tables:
      - name: DEPARTMENT_CP
  
  - name: stores
    database: WALMARTDB
    schema: DATA
    tables:
      - name: STORES_CP
  
  - name: fact
    database: WALMARTDB
    schema: DATA
    tables:
      - name: FACT_CP
